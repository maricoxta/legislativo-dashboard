<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legislativo Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/custom.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 900:'#1e3a5f' }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col z-30 transition-transform">
    <div class="p-5 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-500 rounded-lg flex items-center justify-center shrink-0">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <p class="font-bold text-sm leading-none">Legislativo BR</p>
          <p class="text-xs text-slate-400 mt-0.5">Painel de Proposições</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 p-3 overflow-y-auto space-y-1 text-sm">
      <a href="#/" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-slate-700 transition-colors">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="#/busca" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-slate-700 transition-colors">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Busca Avançada
      </a>
      <a href="#/monitoramento" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-slate-700 transition-colors">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Monitoramento
      </a>
      <a href="#/agenda" class="nav-link flex items-center gap-2.5 px-3 py-2 rounded-lg hover:bg-slate-700 transition-colors">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Agenda Legislativa
      </a>

      <div class="pt-3">
        <div class="flex items-center gap-2 px-3 mb-1.5">
          <div class="w-2 h-2 rounded-full bg-green-400"></div>
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Câmara dos Deputados</span>
        </div>
        <div id="camara-temas" class="space-y-0.5">
          <div class="px-3 py-1.5 text-slate-500 text-xs">Carregando temas...</div>
        </div>
      </div>

      <div class="pt-3">
        <div class="flex items-center gap-2 px-3 mb-1.5">
          <div class="w-2 h-2 rounded-full bg-purple-400"></div>
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Senado Federal</span>
        </div>
        <div id="senado-temas" class="space-y-0.5">
          <a href="#/senado/PL" class="nav-link flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-700 transition-colors text-slate-300">Projetos de Lei</a>
          <a href="#/senado/PEC" class="nav-link flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-700 transition-colors text-slate-300">PEC - Emendas Constitucionais</a>
          <a href="#/senado/MPV" class="nav-link flex items-center gap-2 px-3 py-1.5 rounded-lg hover:bg-slate-700 transition-colors text-slate-300">Medidas Provisórias</a>
        </div>
      </div>
    </nav>

    <div class="p-4 border-t border-slate-700 text-xs text-slate-500">
      <p>Dados: <a href="https://dadosabertos.camara.leg.br" target="_blank" class="text-blue-400 hover:underline">Câmara</a> &amp; <a href="https://legis.senado.leg.br/dadosabertos" target="_blank" class="text-blue-400 hover:underline">Senado</a></p>
    </div>
  </aside>

  <!-- Main -->
  <main class="ml-64 min-h-screen flex flex-col">

    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 px-6 py-3.5 sticky top-0 z-20">
      <div class="flex items-center gap-4">
        <div class="relative flex-1 max-w-sm">
          <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="global-search" placeholder="Buscar proposição, ementa, tema..." class="w-full pl-9 pr-4 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div id="topbar-breadcrumb" class="text-sm text-gray-500"></div>
        <div class="ml-auto flex items-center gap-2">
          <span id="api-status" class="flex items-center gap-1.5 text-xs text-gray-500">
            <span class="w-2 h-2 rounded-full bg-gray-300" id="api-dot"></span>
            <span id="api-label">Aguardando</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Router outlet -->
    <div id="app" class="flex-1 p-6"></div>
  </main>

  <!-- Loading overlay -->
  <div id="loading" class="fixed inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl p-8 flex flex-col items-center gap-4">
      <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-sm font-medium text-gray-600" id="loading-msg">Carregando dados...</p>
    </div>
  </div>

  <!-- Detail Drawer -->
  <div id="drawer" class="fixed inset-0 z-40 hidden">
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm" id="drawer-overlay"></div>
    <div class="fixed right-0 top-0 h-full w-full max-w-2xl bg-white shadow-2xl overflow-y-auto flex flex-col" id="drawer-content">
      <div class="sticky top-0 bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between z-10">
        <h3 class="font-semibold text-gray-900" id="drawer-title">Detalhes da Proposição</h3>
        <button id="drawer-close" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="drawer-body" class="flex-1 p-6"></div>
    </div>
  </div>

  <script src="js/bundle.js"></script>
</body>
</html>
